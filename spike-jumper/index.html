<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spike Jumper Quest</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; }
canvas { display: block; image-rendering: pixelated; border: 2px solid #2a2a4a; box-shadow: 0 0 40px #4040ff44; }
#ui { color: #aaaaff; font-size: 13px; margin-top: 8px; opacity: 0.7; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">SPACE — tap: hop &nbsp;|&nbsp; hold: full jump &nbsp;|&nbsp; survive!</div>
<script>
// ── Canvas setup ──────────────────────────────────────────────
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const W = 800, H = 300;
C.width = W; C.height = H;

// ── Audio ─────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq, dur, type = 'square', vol = 0.15) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.connect(g); g.connect(AC.destination);
  o.start(); o.stop(AC.currentTime + dur);
}
function sfxJump(big) { beep(big ? 320 : 220, 0.12, 'square', 0.12); }
function sfxLand()    { beep(120, 0.08, 'sawtooth', 0.1); }
function sfxDie()     { beep(80, 0.05, 'sawtooth', 0.2); setTimeout(()=>beep(60,0.3,'sawtooth',0.15),60); }
function sfxScore()   { beep(600, 0.07, 'sine', 0.1); }

// ── State ─────────────────────────────────────────────────────
const GROUND = H - 50;
let state, score, hi, speed, dist, shake, shakeT;
let spaceDown, spaceHeld, holdTime;
let particles, chunks, scrollX;

// ── Player ────────────────────────────────────────────────────
const P = {
  x: 100, y: GROUND, w: 28, h: 36,
  vy: 0, jumps: 0,
  scaleX: 1, scaleY: 1,
  onGround: false,
  trail: [],
  update(dt) {
    if (!this.onGround) this.vy += 900 * dt;
    this.y += this.vy * dt;
    if (this.y >= GROUND) {
      const wasAir = !this.onGround;
      this.y = GROUND; this.vy = 0;
      this.jumps = 0; this.onGround = true;
      if (wasAir) { this.scaleX = 1.4; this.scaleY = 0.6; sfxLand(); }
    } else { this.onGround = false; }
    // squash/stretch easing
    this.scaleX += (1 - this.scaleX) * 12 * dt;
    this.scaleY += (1 - this.scaleY) * 12 * dt;
    // trail
    this.trail.unshift({x: this.x, y: this.y, a: 0.5});
    if (this.trail.length > 8) this.trail.pop();
    this.trail.forEach(t => t.a -= 0.06);
  },
  jump(big) {
    if (this.jumps >= 2) return false;
    this.vy = big ? -520 : -340;
    this.onGround = false; this.jumps++;
    this.scaleX = 0.7; this.scaleY = 1.4;
    sfxJump(big); return true;
  },
  draw() {
    // trail
    this.trail.forEach((t, i) => {
      const a = Math.max(0, t.a);
      ctx.fillStyle = `rgba(100,140,255,${a})`;
      const s = 1 - i * 0.1;
      ctx.fillRect(t.x - this.w/2 * s, t.y - this.h * s, this.w * s, this.h * s);
    });
    // body
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.scale(this.scaleX, this.scaleY);
    ctx.fillStyle = '#6688ff';
    ctx.fillRect(-this.w/2, -this.h, this.w, this.h);
    // visor
    ctx.fillStyle = '#aaccff';
    ctx.fillRect(-this.w/2 + 4, -this.h + 6, this.w - 8, 10);
    // boots
    ctx.fillStyle = '#334488';
    ctx.fillRect(-this.w/2 - 2, -8, 14, 8);
    ctx.fillRect(this.w/2 - 12, -8, 14, 8);
    ctx.restore();
  },
  bounds() { return {x:this.x - this.w/2+4, y:this.y - this.h+4, w:this.w-8, h:this.h-8}; }
};

// ── Obstacle pattern chunks ────────────────────────────────────
const CHUNKS = [
  // [type, relX, w, h, y-offset] (y=0 → ground level, neg → floating)
  [[0, 0,  20, 36, 0]],
  [[0, 0,  18, 50, 0]],
  [[0, 0,  20, 28, 0], [0, 70, 20, 28, 0]],
  [[0, 0,  20, 60, 0], [0, 90, 20, 28, 0]],
  [[1, 0,  60, 18, -90]],                         // floating platform spike
  [[0, 0,  18, 36, 0], [1, 50, 60, 14, -70]],
  [[0, 0,  20, 44, 0], [0, 55, 20, 44, 0], [0, 110, 20, 44, 0]],
  [[1, 0,  80, 12, -110]],
];

// ── Hazard types ───────────────────────────────────────────────
// type 0: spike (ground), type 1: crusher (floating bar)
function makeHazard(type, x, w, h, yoff) {
  return { type, x, w, h, y: GROUND + yoff - (type===0?h:0), yoff, alive: true };
}

// ── Particles ─────────────────────────────────────────────────
function burst(x, y, n = 16, col = '#ff6644') {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 60 + Math.random() * 180;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 120,
      life: 0.6 + Math.random()*0.4, maxLife: 1, col, r: 2+Math.random()*4 });
  }
}

// ── Parallax layers ───────────────────────────────────────────
function drawBG() {
  // sky gradient
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0d0d1a'); grad.addColorStop(1,'#1a0d2e');
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);

  // stars (layer 1 — slowest)
  ctx.fillStyle = '#ffffff22';
  const sx = scrollX * 0.05 % W;
  for (let i = 0; i < 60; i++) {
    const px = (i * 137 - sx + W*4) % W;
    const py = (i * 73) % (GROUND - 20);
    ctx.fillRect(px, py, 1, 1);
  }

  // distant mountains (layer 2)
  ctx.fillStyle = '#1a1a3a';
  const mx = scrollX * 0.2 % W;
  for (let i = 0; i < 6; i++) {
    const bx = (i * 160 - mx + W*4) % (W + 160);
    ctx.beginPath(); ctx.moveTo(bx, GROUND);
    ctx.lineTo(bx + 60, GROUND - 80 - (i*31)%60);
    ctx.lineTo(bx + 120, GROUND);
    ctx.fill();
  }

  // mid buildings (layer 3)
  ctx.fillStyle = '#12122a';
  const bx2 = scrollX * 0.5 % W;
  for (let i = 0; i < 8; i++) {
    const bx = (i * 110 - bx2 + W*4) % (W + 110);
    const bh = 40 + (i * 41) % 60;
    ctx.fillRect(bx, GROUND - bh, 60 + (i*17)%40, bh);
    // windows
    ctx.fillStyle = '#3a3a6a44';
    for (let wy = GROUND - bh + 8; wy < GROUND - 10; wy += 14)
      for (let wx = bx + 6; wx < bx + 56; wx += 12)
        ctx.fillRect(wx, wy, 6, 8);
    ctx.fillStyle = '#12122a';
  }

  // ground
  ctx.fillStyle = '#1e1e3e';
  ctx.fillRect(0, GROUND, W, H - GROUND);
  ctx.fillStyle = '#3a3a7a';
  ctx.fillRect(0, GROUND, W, 3);

  // ground detail lines (moving)
  ctx.fillStyle = '#2a2a5a';
  const gx = scrollX % 80;
  for (let i = 0; i < 12; i++)
    ctx.fillRect((i * 80 - gx + W*2) % W, GROUND + 8, 40, 2);
}

// ── Draw hazard ───────────────────────────────────────────────
function drawHazard(h) {
  if (h.type === 0) {
    // spike
    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.moveTo(h.x, h.y + h.h);
    ctx.lineTo(h.x + h.w/2, h.y);
    ctx.lineTo(h.x + h.w, h.y + h.h);
    ctx.fill();
    ctx.fillStyle = '#ff8866';
    ctx.beginPath();
    ctx.moveTo(h.x + 2, h.y + h.h);
    ctx.lineTo(h.x + h.w/2, h.y + 4);
    ctx.lineTo(h.x + h.w - 2, h.y + h.h);
    ctx.fill();
  } else {
    // floating crusher
    ctx.fillStyle = '#cc44ff';
    ctx.fillRect(h.x, h.y, h.w, h.h);
    ctx.fillStyle = '#ee88ff';
    ctx.fillRect(h.x, h.y, h.w, 3);
    // danger spikes on bottom
    for (let i = 0; i < Math.floor(h.w/10); i++) {
      const sx = h.x + i*10 + 5;
      ctx.fillStyle = '#ff44cc';
      ctx.beginPath();
      ctx.moveTo(sx-4, h.y+h.h); ctx.lineTo(sx, h.y+h.h+8); ctx.lineTo(sx+4, h.y+h.h);
      ctx.fill();
    }
  }
}

// ── AABB collision ────────────────────────────────────────────
function overlaps(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

// ── Score display ─────────────────────────────────────────────
function drawHUD() {
  ctx.fillStyle = '#aaaaff';
  ctx.font = 'bold 18px Courier New';
  ctx.fillText(`${Math.floor(score)}m`, W - 100, 28);
  ctx.font = '13px Courier New';
  ctx.fillStyle = '#6666aa';
  ctx.fillText(`best: ${Math.floor(hi)}m`, W - 100, 46);
  // speed bar
  const pct = Math.min((speed - 250) / 400, 1);
  ctx.fillStyle = '#222244';
  ctx.fillRect(12, 12, 100, 10);
  ctx.fillStyle = `hsl(${200 + pct*60}, 80%, 60%)`;
  ctx.fillRect(12, 12, 100 * pct, 10);
  ctx.fillStyle = '#aaaaff';
  ctx.font = '10px Courier New';
  ctx.fillText('SPD', 14, 34);
}

// ── Spawn logic ───────────────────────────────────────────────
let nextChunkX;
function spawnChunk() {
  const chunk = CHUNKS[Math.floor(Math.random() * CHUNKS.length)];
  chunk.forEach(([type, relX, w, h, yoff]) => {
    chunks.push(makeHazard(type, nextChunkX + relX, w, h, yoff));
  });
  const span = chunk.reduce((m, c) => Math.max(m, c[1] + c[2]), 0);
  nextChunkX += span + 180 + Math.random() * 120 - speed * 0.05;
  nextChunkX = Math.max(nextChunkX, nextChunkX); // clamp handled by gap floor
}

// ── Init / reset ──────────────────────────────────────────────
function init() {
  state = 'start'; score = 0; speed = 250; dist = 0;
  shake = 0; shakeT = 0;
  particles = []; chunks = []; scrollX = 0;
  spaceDown = false; spaceHeld = false; holdTime = 0;
  P.x = 100; P.y = GROUND; P.vy = 0; P.jumps = 0;
  P.scaleX = 1; P.scaleY = 1; P.trail = [];
  hi = parseFloat(localStorage.getItem('sjHi') || 0);
  nextChunkX = W + 100;
  for (let i = 0; i < 3; i++) spawnChunk();
}

// ── Game over ─────────────────────────────────────────────────
function die() {
  sfxDie();
  shake = 12; shakeT = 0.4;
  burst(P.x, P.y - P.h/2, 20, '#6688ff');
  burst(P.x, P.y - P.h/2, 12, '#ff4444');
  if (score > hi) { hi = score; localStorage.setItem('sjHi', hi); }
  state = 'dead';
}

// ── Screens ───────────────────────────────────────────────────
function drawStart() {
  drawBG();
  ctx.fillStyle = '#6688ff';
  ctx.font = 'bold 42px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('SPIKE JUMPER', W/2, H/2 - 40);
  ctx.fillStyle = '#aaaaff';
  ctx.font = '18px Courier New';
  ctx.fillText('QUEST', W/2, H/2 - 12);
  ctx.fillStyle = '#8888cc';
  ctx.font = '14px Courier New';
  ctx.fillText('Press SPACE to begin', W/2, H/2 + 30);
  ctx.fillStyle = '#555588';
  ctx.font = '12px Courier New';
  ctx.fillText(`Best: ${Math.floor(hi)}m`, W/2, H/2 + 55);
  ctx.textAlign = 'left';
}

function drawDead() {
  // still draw world behind
  ctx.fillStyle = 'rgba(10,5,20,0.7)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 36px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('YOU DIED', W/2, H/2 - 30);
  ctx.fillStyle = '#aaaaff';
  ctx.font = '16px Courier New';
  ctx.fillText(`Score: ${Math.floor(score)}m`, W/2, H/2 + 4);
  if (score >= hi) { ctx.fillStyle = '#ffdd44'; ctx.fillText('NEW BEST!', W/2, H/2 + 26); }
  ctx.fillStyle = '#8888cc';
  ctx.font = '13px Courier New';
  ctx.fillText('Press SPACE to retry', W/2, H/2 + 52);
  ctx.textAlign = 'left';
}

// ── Main loop ─────────────────────────────────────────────────
let last = 0;
function loop(ts) {
  const dt = Math.min((ts - last) / 1000, 0.05); last = ts;

  if (state === 'start') { drawStart(); requestAnimationFrame(loop); return; }

  if (state === 'dead') {
    // update particles only
    particles.forEach(p => { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=300*dt; p.life-=dt; });
    particles = particles.filter(p=>p.life>0);
    drawBG();
    chunks.forEach(drawHazard);
    particles.forEach(p => {
      ctx.globalAlpha = p.life/p.maxLife;
      ctx.fillStyle = p.col;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
    drawDead();
    requestAnimationFrame(loop); return;
  }

  // ── Playing ──
  // hold jump logic
  if (spaceHeld) {
    holdTime += dt;
    if (holdTime > 0.22 && holdTime < 0.24) {
      // upgraded to big jump handled on press; just let gravity do it
    }
  }

  // speed ramp
  speed = 250 + dist * 0.06;
  dist += speed * dt;
  score = dist / 10;

  // milestone sfx
  if (Math.floor(score) % 50 === 0 && Math.floor(score) > 0 && Math.floor(score) !== Math.floor(score - speed*dt/10))
    sfxScore();

  scrollX += speed * dt;

  // update player
  P.update(dt);

  // spawn
  while (nextChunkX < scrollX + W + 200) spawnChunk();

  // move hazards
  chunks.forEach(h => h.x -= speed * dt);
  chunks = chunks.filter(h => h.x + h.w > -20);

  // collision
  const pb = P.bounds();
  for (const h of chunks) {
    const hb = {x:h.x, y:h.y, w:h.w, h:h.h};
    if (overlaps(pb, hb)) { die(); break; }
  }

  // screen shake
  if (shakeT > 0) { shakeT -= dt; shake *= 0.85; }
  else shake = 0;
  const sx = (Math.random()-0.5)*shake, sy = (Math.random()-0.5)*shake;

  // particles update
  particles.forEach(p => { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=300*dt; p.life-=dt; });
  particles = particles.filter(p=>p.life>0);

  // ── Draw ──
  ctx.save();
  ctx.translate(sx, sy);

  drawBG();
  chunks.forEach(drawHazard);

  // particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life/p.maxLife;
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  P.draw();
  ctx.restore();
  drawHUD();

  requestAnimationFrame(loop);
}

// ── Input ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code !== 'Space') return;
  e.preventDefault();
  if (e.repeat) return;
  if (AC.state === 'suspended') AC.resume();

  if (state === 'start') { state = 'playing'; return; }
  if (state === 'dead') { init(); state = 'playing'; return; }

  spaceHeld = true; spaceDown = true; holdTime = 0;
  // Immediate small hop; will upgrade to full jump on hold release
  P.jump(false);
});

document.addEventListener('keyup', e => {
  if (e.code !== 'Space') return;
  if (!spaceHeld) return;
  const big = holdTime > 0.15;
  // If held long enough and still in air, boost upward
  if (big && !P.onGround && P.vy > -400) {
    P.vy = Math.min(P.vy, -460);
    P.scaleX = 0.65; P.scaleY = 1.5;
  }
  spaceHeld = false; spaceDown = false;
});

// touch support
C.addEventListener('touchstart', e => {
  e.preventDefault();
  if (AC.state === 'suspended') AC.resume();
  if (state !== 'playing') { if(state==='dead') init(); state='playing'; return; }
  spaceHeld = true; holdTime = 0;
  P.jump(false);
}, {passive:false});
C.addEventListener('touchend', e => {
  e.preventDefault();
  const big = holdTime > 0.15;
  if (big && !P.onGround && P.vy > -400) { P.vy = Math.min(P.vy,-460); }
  spaceHeld = false;
}, {passive:false});

// ── Boot ──────────────────────────────────────────────────────
init();
requestAnimationFrame(loop);
</script>
</body>
</html>
